version: '3.8'

services:
  # Relational Database with Geospatial Support
  db:
    image: postgis/postgis:15-3.4
    container_name: civil_eng_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: civil_eng_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d civil_eng_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-Compatible Object Storage for Documents & Photos
  minio:
    image: minio/minio:latest
    container_name: civil_eng_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secretpassword
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Web Console Port
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Vector Database for strict RAG Compliance Checking
  qdrant:
    image: qdrant/qdrant:latest
    container_name: civil_eng_vector_db
    ports:
      - "6333:6333" # REST API Port
      - "6334:6334" # gRPC Port
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

volumes:
  pgdata:
    name: civil_eng_pgdata
  miniodata:
    name: civil_eng_miniodata
  qdrantdata:
    name: civil_eng_qdrantdata
